services:
  - type: web
    name: cinebook-api
    runtime: go
    rootDir: backend
    buildCommand: go build -o bin/server ./cmd/server
    startCommand: ./bin/server
    envVars:
      - key: PORT
        value: 8080
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cinebook-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # set manually in Render dashboard after frontend deploys

databases:
  - name: cinebook-db
    databaseName: cinebook
    user: cinebook
